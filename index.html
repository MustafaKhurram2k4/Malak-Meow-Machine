// ── Button image swap (explicit, reliable) ──────────────────────────
var btn = document.getElementById('mb');
var img = document.getElementById('bi');
var UC  = 'assets/unclicked.png';
var CL  = 'assets/clicked.png';
var snd = new Audio('https://www.myinstants.com/media/sounds/meow-1.mp3');

function showClicked()   { img.src = CL; }
function showUnclicked() { img.src = UC; }

function spawnHearts(e) {
  var emojis = ['\uD83E\uDEB7','\uD83D\uDC97','\u2728','\uD83D\uDC3E','\uD83D\uDC95','\uD83C\uDF38'];
  var r  = btn.getBoundingClientRect();
  var cx = r.left + r.width  / 2;
  var cy = r.top  + r.height / 2;
  if (e.changedTouches && e.changedTouches[0]) {
    cx = e.changedTouches[0].clientX;
    cy = e.changedTouches[0].clientY;
  } else if (e.clientX) { cx = e.clientX; cy = e.clientY; }
  for (var i = 0; i < 6; i++) {
    var h = document.createElement('span');
    h.className   = 'ht';
    h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    h.style.left  = (cx + (Math.random() - 0.5) * 90) + 'px';
    h.style.top   = (cy + (Math.random() - 0.5) * 40) + 'px';
    h.style.animationDelay = (Math.random() * 0.2) + 's';
    document.body.appendChild(h);
    h.addEventListener('animationend', function(){ this.remove(); });
  }
}

// Press  → show clicked image
btn.addEventListener('mousedown',  showClicked);
btn.addEventListener('touchstart', showClicked, { passive: true });

// Release → show unclicked image + sound + hearts
btn.addEventListener('mouseup', function(e) {
  showUnclicked();
  snd.currentTime = 0;
  snd.play();
  spawnHearts(e);
});
btn.addEventListener('touchend', function(e) {
  showUnclicked();
  snd.currentTime = 0;
  snd.play();
  spawnHearts(e);
});

// Dragged off button without releasing → reset image
btn.addEventListener('mouseleave', showUnclicked);
// ────────────────────────────────────────────────────────────────────
