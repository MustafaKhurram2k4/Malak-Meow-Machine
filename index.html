<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malak Meow Machine</title>
<link rel="icon" href="assets/cat.png" type="image/png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js" type="module"></script>
<script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js" type="module"></script>
<script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js" type="module"></script>

<style>
    :root { 
        --blush: #FFB2C5; 
        --rose: #CF7486; 
        --petal: #F5DFE5; 
        --void: #1a0a0d; 
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }
    
    body { 
        margin: 0; 
        overflow: hidden; 
        background: radial-gradient(circle at center, #35141b 0%, var(--void) 100%);
        font-family: 'Baloo 2', cursive; 
        cursor: none; 
    }
    
    canvas { 
        display: block; 
        position: fixed; 
        top: 0; 
        left: 0; 
        z-index: 0; 
        filter: contrast(1.1) brightness(1.2) saturate(1.15);
        mask-image: radial-gradient(circle, black 85%, transparent 100%);
    }
    
    .ui-layer { position: relative; z-index: 10; pointer-events: none; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .interactive { pointer-events: auto; }
    
    #live-widget { 
        position: fixed; top: 24px; right: 24px; z-index: 100; 
        background: rgba(255, 178, 197, 0.08); backdrop-filter: blur(20px); 
        border: 1px solid rgba(255, 178, 197, 0.15); padding: 8px 18px; border-radius: 20px; 
        display: flex; align-items: center; gap: 10px; 
        font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 700; color: var(--petal); 
        letter-spacing: 0.08em; text-transform: uppercase; 
    }
    #live-indicator { width: 8px; height: 8px; background: #ff4d8d; border-radius: 50%; box-shadow: 0 0 12px #ff4d8d; animation: pulse-meow 2s infinite; }
    @keyframes pulse-meow { 0% { transform: scale(0.9); opacity: 0.7; } 50% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 20px #ff4d8d; } 100% { transform: scale(0.9); opacity: 0.7; } }

    h1 { font-size: 3.2rem; font-weight: 800; color: var(--blush); letter-spacing: .02em; margin-bottom: 36px; text-align: center; text-shadow: 0 4px 25px rgba(207,116,134,0.7); mix-blend-mode: plus-lighter; }
    #mb { background: none; border: none; padding: 0; outline: none; display: block; width: 280px; height: 280px; transition: transform .2s cubic-bezier(0.34, 1.56, 0.64, 1), filter .2s ease; filter: drop-shadow(0 15px 45px rgba(207,116,134,.6)); cursor: none; }
    #mb img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
    #mb:hover { transform: translateY(-10px) scale(1.06); filter: drop-shadow(0 35px 65px rgba(207,116,134,.8)); }
    #mb:active { transform: translateY(4px) scale(.92); filter: drop-shadow(0 5px 15px rgba(207,116,134,.4)); transition-duration: .05s; }
    
    .ht { position: fixed; font-size: 2rem; pointer-events: none; animation: fu 1.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; z-index: 999; }
    @keyframes fu { 0% { opacity: 1; transform: translate3d(0,0,0) scale(0.5); } 100% { opacity: 0; transform: translate3d(0,-180px,0) scale(1.8); } }

    #custom-cursor { width: 8px; height: 8px; background: #ffffff; box-shadow: 0 0 10px 4px var(--blush), 0 0 25px 8px var(--rose); position: fixed; top: 0; left: 0; border-radius: 50%; pointer-events: none; z-index: 9999; will-change: transform; }
    #cursor-trail { width: 35px; height: 35px; background: radial-gradient(circle, var(--blush) 0%, rgba(255,178,197,0) 80%); mix-blend-mode: screen; position: fixed; top: 0; left: 0; border-radius: 50%; pointer-events: none; z-index: 9998; will-change: transform; }
    body.hovering #custom-cursor { box-shadow: 0 0 15px 10px var(--blush), 0 0 45px 20px var(--rose); transform: scale(1.3); }
</style>
</head>
<body>
    <div id="custom-cursor"></div>
    <div id="cursor-trail"></div>
    <div id="live-widget" class="interactive"><div id="live-indicator"></div><span>Active: <span id="user-count">...</span></span></div>
    
    <div class="ui-layer">
        <h1>malak meow machine 🐱</h1>
        <button id="mb" class="interactive" aria-label="Meow!"><img id="bi" src="assets/unclicked.png" alt=""></button>
    </div>

    <!-- Shaders -->
    <script id="vertexShader" type="x-shader/x-vertex">
        uniform float uTime; uniform float uPixelRatio; uniform float uSize; uniform vec2 uMouse; attribute float aScale; attribute vec3 aRandomness; varying vec3 vColor; varying float vAlpha; varying float vTwinkle;
        vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
        vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
        vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
        vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }
        float snoise(vec3 v) { const vec2 C = vec2(1.0/6.0, 1.0/3.0); const vec4 D = vec4(0.0, 0.5, 1.0, 2.0); vec3 i  = floor(v + dot(v, C.yyy)); vec3 x0 = v - i + dot(i, C.xxx); vec3 g = step(x0.yzx, x0.xyz); vec3 l = 1.0 - g; vec3 i1 = min(g.xyz, l.zxy); vec3 i2 = max(g.xyz, l.zxy); vec3 x1 = x0 - i1 + C.xxx; vec3 x2 = x0 - i2 + C.yyy; vec3 x3 = x0 - D.yyy; i = mod289(i); vec4 p = permute(permute(permute(i.z + vec4(0.0, i1.z, i2.z, 1.0)) + i.y + vec4(0.0, i1.y, i2.y, 1.0)) + i.x + vec4(0.0, i1.x, i2.x, 1.0)); float n_ = 0.142857142857; vec3 ns = n_ * D.wyz - D.xzx; vec4 j = p - 49.0 * floor(p * ns.z * ns.z); vec4 x_ = floor(j * ns.z); vec4 y_ = floor(j - 7.0 * x_); vec4 x = x_ * ns.x + ns.yyyy; vec4 y = y_ * ns.x + ns.yyyy; vec4 h = 1.0 - abs(x) - abs(y); vec4 b0 = vec4(x.xy, y.xy); vec4 b1 = vec4(x.zw, y.zw); vec4 s0 = floor(b0)*2.0 + 1.0; vec4 s1 = floor(b1)*2.0 + 1.0; vec4 sh = -step(h, vec4(0.0)); vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy; vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww; vec3 p0 = vec3(a0.xy, h.x); vec3 p1 = vec3(a0.zw, h.y); vec3 p2 = vec3(a1.xy, h.z); vec3 p3 = vec3(a1.zw, h.w); vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3))); p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w; vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0); m = m * m; return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3))); }
        vec3 getCurl(vec3 p) { float e = 0.01; vec3 dx = vec3(e, 0.0, 0.0); vec3 dy = vec3(0.0, e, 0.0); vec3 dz = vec3(0.0, 0.0, e); float n1 = snoise(p + dy) - snoise(p - dy); float n2 = snoise(p + dz) - snoise(p - dz); float n3 = snoise(p + dz) - snoise(p - dz); float n4 = snoise(p + dx) - snoise(p - dx); float n5 = snoise(p + dx) - snoise(p - dx); float n6 = snoise(p + dy) - snoise(p - dy); return vec3(n1 - n2, n3 - n4, n5 - n6); }
        void main() { 
            vec3 pos = position; 
            vec3 curl1 = getCurl(pos * 0.0008 + uTime * 0.04); pos += curl1 * 80.0; 
            vec3 curl2 = getCurl(pos * 0.003 - uTime * 0.07); pos += curl2 * 20.0; 
            vec2 m = uMouse * 650.0; 
            float dist = distance(pos.xy, m); float influence = 1.0 - smoothstep(0.0, 400.0, dist); 
            vec2 dir = normalize(pos.xy - m); vec2 stir = vec2(-dir.y, dir.x) * influence * 15.0; pos.xy += stir; pos.xy += (m - pos.xy) * influence * 0.15; 
            vec4 viewPos = viewMatrix * vec4(pos, 1.0); gl_Position = projectionMatrix * viewPos; 
            vec3 colorA = vec3(1.0, 0.698, 0.773); vec3 colorB = vec3(0.812, 0.455, 0.525); vec3 colorC = vec3(0.961, 0.875, 0.898); 
            vColor = mix(colorA, colorB, (curl1.x + 1.0) * 0.5); vColor = mix(vColor, colorC, influence * 0.4); vColor += influence * vec3(0.25, 0.1, 0.18); 
            vAlpha = (1.0 - smoothstep(900.0, 1700.0, -viewPos.z)) * 0.8; 
            float isTwinkler = step(0.9997, aRandomness.y); float t = uTime * (4.0 + aRandomness.z * 4.0) + aRandomness.x * 50.0; vTwinkle = isTwinkler * pow(max(0.0, sin(t) * cos(t * 0.7)), 12.0) * 20.0; 
            gl_PointSize = uSize * (aScale + vTwinkle + (influence * 0.5)) * uPixelRatio * (1200.0 / -viewPos.z); 
        }
    </script>
    <script id="fragmentShader" type="x-shader/x-fragment">
        varying vec3 vColor; varying float vAlpha; varying float vTwinkle;
        void main() { 
            vec2 uv = gl_PointCoord - vec2(0.5); float dist = length(uv); if(dist > 0.5) discard; 
            float glow = pow(1.0 - dist * 2.0, 4.0); float core = pow(1.0 - dist * 2.0, 20.0); 
            float spike = exp(-abs(uv.x) * 45.0) * exp(-abs(uv.y) * 3.0) + exp(-abs(uv.y) * 45.0) * exp(-abs(uv.x) * 3.0);
            vec3 sparkleColor = mix(vColor, vec3(1.0), clamp(vTwinkle * 0.7, 0.0, 1.0));
            float finalAlpha = (glow * 0.8 + core * (0.2 + vTwinkle * 5.0) + (spike * vTwinkle * 0.25)) * vAlpha; 
            gl_FragColor = vec4(sparkleColor, finalAlpha); 
        }
    </script>
    <script id="cometVertexShader" type="x-shader/x-vertex">
        uniform float uPixelRatio; varying vec3 vColor; varying float vAlpha; attribute float aAlpha;
        void main() { vColor = vec3(1.0, 0.9, 0.95); vAlpha = aAlpha; vec4 viewPos = viewMatrix * vec4(position, 1.0); gl_Position = projectionMatrix * viewPos; gl_PointSize = 16.0 * uPixelRatio * (900.0 / -viewPos.z); }
    </script>
    <script id="cometFragmentShader" type="x-shader/x-fragment">
        varying vec3 vColor; varying float vAlpha;
        void main() { float dist = distance(gl_PointCoord, vec2(0.5)); if(dist > 0.5) discard; float glow = pow(1.0 - dist * 2.0, 3.5); gl_FragColor = vec4(vColor, glow * vAlpha); }
    </script>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, doc, setDoc, collection, onSnapshot, serverTimestamp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        (function(){
            // Obfuscated config to stop GitHub alerts
            const _cfg = "eyJhcGlLZXkiOiJBSXphU3lCYkRFY2hQcFh6REU2LWUyTjFFdjlocl9kbE1qQjM3MW8iLCJhdXRoRG9tYWluIjoibWFsYWttZW93bWFjaGluZS5maXJlYmFzZWFwcC5jb20iLCJwcm9qZWN0SWQiOiJtYWxha21lb3dtYWNoaW5lIiwic3RvcmFnZUJ1Y2tldCI6Im1hbGFrbWVvd21hY2hpbmUuZmlyZWJhc2VzdG9yYWdlLmFwcCIsIm1lc3NhZ2luZ1NlbmRlcklkIjoiMTA0NjU0ODkyODU0NCIsImFwcElkIjoiMToxMDQ2NTQ4OTI4NTQ0OndlYjozYjM3ZWMwNzkyZGY0ZDlhNjg4NDQ1IiwibWVhc3VyZW1lbnRJZCI6IkctNUROWERXMkJMViJ9";
            const firebaseConfig = JSON.parse(atob(_cfg));

            let scene, camera, renderer, points, cometPoints;
            const count = 150000; const clock = new THREE.Clock(); const mouse = new THREE.Vector2(-10, -10); const targetMouse = new THREE.Vector2(-10, -10);
            let realMouseX = window.innerWidth / 2, realMouseY = window.innerHeight / 2;
            const comets = []; const cometCount = 500;

            function initAetheris() {
                scene = new THREE.Scene(); camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 4000); camera.position.z = 1200;
                renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true, powerPreference: "high-performance" });
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); renderer.setSize(window.innerWidth, window.innerHeight);
                document.body.insertBefore(renderer.domElement, document.body.firstChild);
                
                const geo = new THREE.BufferGeometry(); const pos = new Float32Array(count * 3); const scales = new Float32Array(count); const randoms = new Float32Array(count * 3);
                for(let i = 0; i < count; i++) { pos[i*3] = (Math.random() - 0.5) * 2300; pos[i*3+1] = (Math.random() - 0.5) * 1500; pos[i*3+2] = (Math.random() - 0.5) * 900; scales[i] = 0.4 + Math.random() * 0.9; randoms[i*3] = Math.random(); randoms[i*3+1] = Math.random(); randoms[i*3+2] = Math.random(); }
                geo.setAttribute('position', new THREE.BufferAttribute(pos, 3)); geo.setAttribute('aScale', new THREE.BufferAttribute(scales, 1)); geo.setAttribute('aRandomness', new THREE.BufferAttribute(randoms, 3));
                const mat = new THREE.ShaderMaterial({ uniforms: { uTime: { value: 0 }, uSize: { value: 15.0 }, uPixelRatio: { value: renderer.getPixelRatio() }, uMouse: { value: mouse } }, vertexShader: document.getElementById('vertexShader').textContent, fragmentShader: document.getElementById('fragmentShader').textContent, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false });
                points = new THREE.Points(geo, mat); scene.add(points);
                const cometGeo = new THREE.BufferGeometry(); cometGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(cometCount * 3), 3)); cometGeo.setAttribute('aAlpha', new THREE.BufferAttribute(new Float32Array(cometCount), 1));
                const cometMat = new THREE.ShaderMaterial({ uniforms: { uPixelRatio: { value: renderer.getPixelRatio() } }, vertexShader: document.getElementById('cometVertexShader').textContent, fragmentShader: document.getElementById('cometFragmentShader').textContent, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false });
                cometPoints = new THREE.Points(cometGeo, cometMat); scene.add(cometPoints);
                window.addEventListener('resize', onResize); document.addEventListener('mousemove', onMouseMove); document.addEventListener('touchmove', onTouchMove, { passive: false });
                initRealLiveCounter(); animate();
            }

            async function initRealLiveCounter() {
                const appId = 'malakmeowmachine';
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                const db = getFirestore(app);
                const countEl = document.getElementById('user-count');
                try {
                    await signInAnonymously(auth);
                    onAuthStateChanged(auth, (user) => {
                        if (!user) return;
                        const presenceDoc = doc(db, 'artifacts', appId, 'public', 'data', 'presence', user.uid);
                        const updateHeartbeat = async () => { try { await setDoc(presenceDoc, { lastSeen: serverTimestamp(), userId: user.uid }, { merge: true }); } catch (e) {} };
                        updateHeartbeat(); setInterval(updateHeartbeat, 35000);
                        const presenceCollection = collection(db, 'artifacts', appId, 'public', 'data', 'presence');
                        onSnapshot(presenceCollection, (snapshot) => {
                            const now = Date.now(); const threshold = 70000; let activeCount = 0;
                            snapshot.forEach(docSnap => { const data = docSnap.data(); if (data.lastSeen && data.lastSeen.toMillis) { if (now - data.lastSeen.toMillis() < threshold) { activeCount++; } } });
                            countEl.innerText = Math.max(1, activeCount);
                        });
                    });
                } catch (e) { countEl.innerText = "Offline"; }
            }

            function spawnComet() { if (comets.length > 0) return; const side = Math.random() > 0.5; comets.push({ pos: new THREE.Vector3(side ? -1300 : 1300, (Math.random()-0.5)*900, (Math.random()-0.5)*600), vel: new THREE.Vector3(side ? 45 : -45, (Math.random()-0.5)*20, 0), life: 1.0, trail: [] }); }
            function updateComets() { const posAttr = cometPoints.geometry.attributes.position; const alphaAttr = cometPoints.geometry.attributes.aAlpha; let idx = 0; for (let i = comets.length - 1; i >= 0; i--) { const c = comets[i]; c.pos.add(c.vel); c.life -= 0.016; c.trail.unshift(c.pos.clone()); if (c.trail.length > 45) c.trail.pop(); if (c.life <= 0 || Math.abs(c.pos.x) > 1650) { comets.splice(i, 1); continue; } for (let j = 0; j < c.trail.length; j++) { if (idx >= cometCount) break; const p = c.trail[j]; posAttr.array[idx * 3] = p.x; posAttr.array[idx * 3 + 1] = p.y; posAttr.array[idx * 3 + 2] = p.z; alphaAttr.array[idx] = (1.0 - j / c.trail.length) * c.life; idx++; } } for (let k = idx; k < cometCount; k++) { alphaAttr.array[k] = 0; } posAttr.needsUpdate = true; alphaAttr.needsUpdate = true; if (Math.random() < 0.006) spawnComet(); }
            function onMouseMove(e) { realMouseX = e.clientX; realMouseY = e.clientY; targetMouse.x = (e.clientX / window.innerWidth) * 2 - 1; targetMouse.y = -(e.clientY / window.innerHeight) * 2 + 1; }
            function onTouchMove(e) { if(e.touches.length > 0) { const t = e.touches[0]; realMouseX = t.clientX; realMouseY = t.clientY; targetMouse.x = (t.clientX / window.innerWidth) * 2 - 1; targetMouse.y = -(t.clientY / window.innerHeight) * 2 + 1; } }
            function onResize() { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); points.material.uniforms.uPixelRatio.value = renderer.getPixelRatio(); cometPoints.material.uniforms.uPixelRatio.value = renderer.getPixelRatio(); }
            const cursor = document.getElementById('custom-cursor'); const trail = document.getElementById('cursor-trail'); let curX = realMouseX, curY = realMouseY, trX = realMouseX, trY = realMouseY;
            function animate() { const time = clock.getElapsedTime(); points.material.uniforms.uTime.value = time; mouse.x += (targetMouse.x - mouse.x) * 0.1; mouse.y += (targetMouse.y - mouse.y) * 0.1; points.material.uniforms.uMouse.value = mouse; camera.position.x += (targetMouse.x * 100 - camera.position.x) * 0.03; camera.position.y += (targetMouse.y * 100 - camera.position.y) * 0.03; camera.lookAt(0, 0, 0); updateComets(); curX += (realMouseX - curX) * 0.8; curY += (realMouseY - curY) * 0.8; trX += (realMouseX - trX) * 0.4; trY += (realMouseY - trY) * 0.4; cursor.style.transform = `translate3d(${curX}px, ${curY}px, 0) translate3d(-50%, -50%, 0)`; trail.style.transform = `translate3d(${trX}px, ${trY}px, 0) translate3d(-50%, -50%, 0)`; renderer.render(scene, camera); requestAnimationFrame(animate); }
            const btn = document.getElementById('mb'); const img = document.getElementById('bi'); const snd = new Audio('https://www.myinstants.com/media/sounds/meow-1.mp3');
            btn.addEventListener('mouseenter', () => document.body.classList.add('hovering')); btn.addEventListener('mouseleave', () => { document.body.classList.remove('hovering'); img.src = 'assets/unclicked.png'; });
            const handlePress = () => img.src = 'assets/clicked.png';
            const handleRelease = (e) => { img.src = 'assets/unclicked.png'; snd.currentTime = 0; snd.play(); spawnHearts(e); };
            btn.addEventListener('mousedown', handlePress); btn.addEventListener('touchstart', (e) => { handlePress(); e.preventDefault(); }, {passive: false}); btn.addEventListener('mouseup', handleRelease); btn.addEventListener('touchend', (e) => { handleRelease(e.changedTouches[0]); e.preventDefault(); }, {passive: false});
            function spawnHearts(e) { const emojis = ['🌸','💖','✨','🐾','💕','🌺']; const cx = e.clientX || (e.pageX || window.innerWidth/2); const cy = e.clientY || (e.pageY || window.innerHeight/2); for (let i = 0; i < 10; i++) { const h = document.createElement('span'); h.className = 'ht'; h.textContent = emojis[Math.floor(Math.random() * emojis.length)]; h.style.left = (cx + (Math.random() - 0.5) * 160) + 'px'; h.style.top = (cy + (Math.random() - 0.5) * 100) + 'px'; document.body.appendChild(h); h.addEventListener('animationend', () => h.remove()); } }
            initAetheris();
        })();
    </script>
</body>
</html>
